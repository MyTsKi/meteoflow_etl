name: MeteoFlow Data Pipeline

on:
  schedule:
    - cron: '23 0,6,12,18 * * *'
  workflow_dispatch: 

jobs:
  extraccion-y-carga:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: 3. Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install httpx pandas sqlalchemy psycopg[binary] python-dotenv

      - name: 4. Ejecutar el Script ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd data_pipeline
          python extract_weather.py
